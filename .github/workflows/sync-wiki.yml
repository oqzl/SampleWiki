name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"
      - ".github/workflows/sync-wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate and flatten Wiki sources
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from collections import Counter
          import shutil

          source = Path("docs/wiki")
          output = Path("wiki-export")
          files = sorted(source.rglob("*.md"))
          names = Counter(path.name for path in files)
          duplicates = sorted(name for name, count in names.items() if count > 1)
          if duplicates:
              raise SystemExit(
                  "Duplicate filenames cannot be flattened for GitHub Wiki: "
                  + ", ".join(duplicates)
              )

          output.mkdir()
          for path in files:
              shutil.copy2(path, output / path.name)
          PY

      - name: Clone wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki

      - name: Replace wiki contents
        run: |
          find wiki -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp wiki-export/*.md wiki/

      - name: Commit and push
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes"
            exit 0
          fi
          git commit -m "Sync wiki from hierarchical docs/wiki sources"
          git push
