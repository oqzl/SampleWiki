name: Build Wiki Index

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"
      - "scripts/build_wiki_index.py"
      - ".github/workflows/build-wiki-index.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-wiki-index-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build JSON index
        run: python3 scripts/build_wiki_index.py

      - name: Validate JSON
        run: python3 -m json.tool data/wiki-index.json > /dev/null

      - name: Commit generated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/wiki-index.json
          if git diff --cached --quiet; then
            echo "Wiki index is up to date"
            exit 0
          fi
          git commit -m "Update generated Wiki JSON index"
          git push
